name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    timeout-minutes: 10
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.13.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.13.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.13.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:coverage --project unit --coverage.reportsDirectory=coverage/unit

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage/unit/
          retention-days: 14

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.13.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:coverage --project integration --coverage.reportsDirectory=coverage/integration

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: coverage/integration/
          retention-days: 14

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --user 1001
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.13.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:e2e
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret' }}
          # storage.ts reads these at module load time (not lazily), so the
          # server crashes on startup if they're missing — even though e2e tests
          # never actually upload or download files. Placeholders are fine here.
          STORAGE_ENDPOINT: https://s3.us-west-004.backblazeb2.com
          STORAGE_BUCKET: ci-placeholder
          STORAGE_KEY_ID: ci-placeholder
          STORAGE_KEY: ci-placeholder

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
